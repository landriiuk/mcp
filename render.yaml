# Optional Render Blueprint.
# Prefer configuring the service in the Render dashboard, or use Docker only.
#
# If you enable this file in Render, keep env: docker and dockerfilePath —
# do not mix with Node buildCommand/startCommand.

services:
  - type: web
    name: mcp-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    branch: main
    plan: starter
